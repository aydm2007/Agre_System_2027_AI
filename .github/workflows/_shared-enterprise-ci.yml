name: Shared Enterprise CI

on:
  workflow_call:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run governance guardrails
        run: |
          python scripts/check_idempotency_actions.py
          python scripts/check_no_float_mutations.py
          python scripts/check_farm_scope_guards.py
          python scripts/verification/check_mojibake_frontend.py
          python scripts/verification/detect_zombies.py
          python scripts/verification/detect_ghost_triggers.py
      - name: Run backend test suite
        working-directory: ./backend
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          DB_NAME: test_db
          DB_TEST_NAME: agriasset_test_clean
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
        run: |
          PGPASSWORD=postgres dropdb -h 127.0.0.1 -p 5432 -U postgres --if-exists agriasset_test_clean
          PGPASSWORD=postgres createdb -h 127.0.0.1 -p 5432 -U postgres agriasset_test_clean
          python manage.py migrate --check --no-input
          python manage.py spectacular --validate --fail-on-warn
          python manage.py test
          python manage.py check --deploy --settings=smart_agri.production_settings
          python manage.py shell -c "from django.db import connection; tbl='accounts_roledelegation'; c=connection.cursor(); constraints=connection.introspection.get_constraints(c, tbl); required={'no_self_delegation','delegation_valid_window'}; missing=required-set(constraints.keys()); (_ for _ in ()).throw(SystemExit(f'Missing constraints: {sorted(missing)}')) if missing else print('RoleDelegation constraints are present')"
      - name: Run non-functional evidence checks
        run: |
          python scripts/verification/check_compliance_docs.py
          python scripts/verification/check_backup_freshness.py
          python scripts/verification/check_restore_drill_evidence.py
          python scripts/verification/check_no_bare_exceptions.py

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Lint, build, and test frontend
        working-directory: ./frontend
        run: |
          npm run lint
          npx tsc --noEmit
          npm run build
          npm run test -- --run
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: ./frontend
        run: npx playwright test

  deployment-check:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Validate runtime stack
        run: |
          docker compose -f docker-compose.yml config
          if [ -f docker-compose.enterprise.yml ]; then docker compose -f docker-compose.enterprise.yml config; fi
      - name: Ensure legacy SQL hotfix folders stay empty
        run: |
          if [ -d "db_patches" ] && compgen -G "db_patches/*.sql" > /dev/null; then
            echo 'Legacy SQL patches detected in db_patches/'
            exit 1
          fi
          echo 'Runtime stack validated.'
