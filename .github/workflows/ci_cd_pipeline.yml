name: DEPRECATED LEGACY - Agri-Guardian CI/CD

on:
  workflow_dispatch:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: smart_agri_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Migrations
      env:
        DB_ENGINE: django.db.backends.postgresql
        DB_NAME: smart_agri_db
        DB_USER: postgres
        DB_PASSWORD: password
        DB_HOST: localhost
        DB_PORT: 5432
      run: |
        cd backend
        python manage.py migrate

    - name: Run Tests (Agri-Guardian Strict Mode)
      env:
        DB_ENGINE: django.db.backends.postgresql
        DB_NAME: smart_agri_db
        DB_USER: postgres
        DB_PASSWORD: password
        DB_HOST: localhost
        DB_PORT: 5432
        AGRI_GUARDIAN_STRICT_MODE: "True"
      run: |
        cd backend
        python manage.py test smart_agri.core.tests smart_agri.finance.tests --verbosity=2

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Project
      run: |
        cd frontend
        npm run build
