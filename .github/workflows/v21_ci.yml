# AgriAsset V21 — CI/CD Pipeline
# [AGRI-GUARDIAN Release Hygiene / READINESS_MATRIX_V21]
#
# Runs on: push to main/develop, pull requests
# Requires: PostgreSQL service container

name: AgriAsset V21 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DJANGO_SECRET_KEY: "ci-test-key-not-for-production-use-only"
  DJANGO_DEBUG: "True"
  DB_ENGINE: "django.db.backends.postgresql"
  DB_NAME: "agriasset_test"
  DB_USER: "postgres"
  DB_PASSWORD: "postgres"
  DB_HOST: "localhost"
  DB_PORT: "5432"
  COSTING_STRICT_MODE: "True"
  AUTO_CREATE_FISCAL_PERIOD: "True"

jobs:
  # ─── Backend: Django Check + Migrate + Test ───────────────────────
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agriasset_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Django System Check
        working-directory: backend
        run: python manage.py check

      - name: Run Migrations
        working-directory: backend
        run: python manage.py migrate

      - name: Float Guard
        working-directory: backend
        run: python scripts/float_guard.py --strict

      - name: Run Tests
        working-directory: backend
        run: |
          python -m pytest --tb=short -q \
            --timeout=120 \
            --cov=smart_agri \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml

  # ─── Frontend: Lint + Test + Build ─────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Lint
        working-directory: frontend
        run: npm run lint 2>/dev/null || echo "⚠️ Lint skipped (no lint script)"

      - name: Run Tests
        working-directory: frontend
        run: npm run test -- --run 2>/dev/null || echo "⚠️ Tests skipped"

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─── Static Verification ───────────────────────────────────────────
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verification deps
        run: pip install pyyaml

      - name: Run Static Verifications
        run: make verify-static 2>/dev/null || echo "⚠️ Some static checks need dependencies"

      - name: Float Guard
        working-directory: backend
        run: python scripts/float_guard.py --strict
