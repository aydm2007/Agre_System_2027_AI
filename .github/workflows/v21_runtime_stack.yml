name: DEPRECATED LEGACY - v21-runtime-stack

on:
  workflow_dispatch:

jobs:
  runtime-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agriasset
          POSTGRES_USER: agriasset
          POSTGRES_PASSWORD: agriasset
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U agriasset -d agriasset"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
      - name: Runtime smoke
        env:
          DATABASE_URL: postgres://agriasset:agriasset@localhost:5432/agriasset
          AGRIASSET_ATTACHMENT_SCAN_MODE: heuristic
        run: bash scripts/ops/v21_runtime_smoke.sh
