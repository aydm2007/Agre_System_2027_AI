version: "21.0"
pack_version: "1.0.0"
status: active_canonical_reference
scope: repository_wide
applies_to: AgriAsset_v44
objective: >-
  توحيد المرجعية الحاكمة للمشروع وربط PRD وAGENTS.md والمهارات والوثائق التنفيذية
  بمصفوفات جاهزية وأدلة تشغيل قابلة للتحقق.

reference_order:
  - rank: 1
    id: prd
    title: PRD
    source: docs/prd/AGRIASSET_V21_MASTER_PRD_AR.md
    governs:
      - product_truth
      - business_rules
      - governance_model
      - acceptance_criteria
  - rank: 2
    id: subtree_agents
    title: Deeper AGENTS.md
    source: any subtree AGENTS.md
    governs:
      - subtree_execution_protocol
      - local_guardrails
    note: overrides root AGENTS only inside its subtree
  - rank: 3
    id: root_agents
    title: Root AGENTS.md
    source: AGENTS.md
    governs:
      - repo_execution_protocol
      - evidence_gating
      - no_regression_rules
  - rank: 4
    id: canonical_skills
    title: Canonical skills only
    source: .agent/skills/*
    governs:
      - specialized_execution_lenses
      - verification_sequences
    restriction: skills may not override PRD or AGENTS
  - rank: 5
    id: doctrine_and_ops
    title: Doctrine / operations / reports
    source: docs/doctrine docs/operations docs/reports
    governs:
      - implementation_guidance
      - runbooks
      - historical_evidence
  - rank: 6
    id: code
    title: Current code state
    source: backend frontend scripts
    governs:
      - actual_behavior_only
    restriction: code that contradicts higher references is non-compliant

non_negotiables:
  - service_layer_only_for_transactional_writes
  - no_frontend_direct_ledger_writes
  - append_only_ledger
  - reversal_based_correction
  - idempotency_for_sensitive_financial_paths
  - decimal_only_for_finance_and_inventory
  - farm_id_isolation
  - smart_card_read_side_only
  - simple_is_control_surface_not_diluted_erp
  - strict_is_full_governed_erp_surface
  - medium_large_require_farm_finance_manager
  - strict_sector_chain_must_not_collapse_to_one_role
  - authoritative_financial_evidence_must_not_be_quick_deleted
  - no_98_without_runtime_proof

canonical_files:
  manifest: docs/reference/REFERENCE_MANIFEST_V21.yaml
  precedence: docs/reference/REFERENCE_PRECEDENCE_AND_OVERRIDE_V21.md
  phase_intake_protocol: docs/reference/PHASE_INTAKE_PROTOCOL_V21.md
  readiness_matrix: docs/reference/READINESS_MATRIX_V21.yaml
  role_permission_matrix: docs/reference/ROLE_PERMISSION_MATRIX_V21.md
  attachment_policy_matrix: docs/reference/ATTACHMENT_POLICY_MATRIX_V21.yaml
  runtime_checklist: docs/reference/RUNTIME_PROOF_CHECKLIST_V21.md
  skills_map: docs/reference/SKILLS_CANONICALIZATION_V21.yaml
  unified_prompt: docs/reference/CANONICAL_UNIFIED_PROMPT_V21.md
  reference_audit: docs/reference/REFERENCE_LAYER_AUDIT_V21.md
  gaps_to_100: docs/reference/IMPLEMENTATION_GAPS_TO_100_V21.md

skills_policy:
  canonical_required:
    - agri_guardian/SKILL.md
    - auditor/SKILL.md
    - financial_integrity/SKILL.md
    - schema_guardian/SKILL_V2.md
    - agri_maestro/SKILL.md
  advisory_or_restricted:
    - startup_sentinel/SKILL.md
    - schema_sentinel/SKILL_NEW.md
    - sql_sync/SKILL.md
  deprecate_or_archive:
    - schema_guardian/SKILL.md
    - schema_sentinel/SKILL.md

startup_sentinel_policy:
  status: diagnostic_only
  forbidden_to_apply_in_release:
    - ALLOWED_HOSTS_wildcard_commit
    - hardcoded_secureish_fallback_db_config
    - settings_py_append_patch_without_review
  allowed_usage:
    - local_diagnosis
    - environment_debugging
    - temporary_non_committed_dev_repair

acceptance_evidence:
  required_for_95_plus:
    - docs_alignment
    - mode_contract_tests
    - governance_chain_tests
    - finance_integrity_tests
    - attachment_policy_tests
    - release_hygiene_clear
    - secrets_hygiene_clear
    - backend_build_and_checks
    - frontend_build_and_tests
  required_for_98:
    - runtime_probe_pass
    - migration_plan_clean
    - target_backend_tests_pass
    - target_frontend_tests_pass
    - release_gate_pass
    - stack_proof_recorded

scoring_axes:
  - id: prd_alignment
    weight: 10
  - id: agents_skills_alignment
    weight: 8
  - id: architecture_integrity
    weight: 8
  - id: simple_strict_separation
    weight: 10
  - id: farm_size_governance
    weight: 7
  - id: sector_approval_chain
    weight: 8
  - id: financial_integrity
    weight: 10
  - id: close_readiness
    weight: 6
  - id: attachment_lifecycle
    weight: 8
  - id: security_hardening
    weight: 7
  - id: release_hygiene
    weight: 5
  - id: schema_migration_readiness
    weight: 5
  - id: runtime_readiness
    weight: 8
  - id: backend_tests
    weight: 4
  - id: frontend_tests_build
    weight: 3
  - id: ui_rtl_role_ux
    weight: 3

change_control:
  any_change_to:
    - PRD
    - AGENTS.md
    - canonical_skills
    - role_permission_matrix
    - attachment_policy_matrix
    - readiness_matrix
  requires:
    - traceability_update
    - impacted_tests_update
    - release_gate_review
    - no_regression_review
