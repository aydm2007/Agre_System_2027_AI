version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: agriasset
      POSTGRES_USER: agriasset
      POSTGRES_PASSWORD: agriasset
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriasset -d agriasset"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"

  backend-smoke:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://agriasset:agriasset@postgres:5432/agriasset
      AGRIASSET_ATTACHMENT_SCAN_MODE: heuristic
      AGRIASSET_ATTACHMENT_OBJECTSTORE_ENABLED: "1"
      AGRIASSET_CLAMD_SCAN_COMMAND: "clamscan --no-summary {file}"
    command: bash -lc "python manage.py check && python manage.py runtime_probe_v21"
