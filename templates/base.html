
{% load static %}
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Saradud v2.1{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Tajawal',system-ui;-webkit-font-smoothing:antialiased;background:#FDFBF7}</style>
</head>
<body class="p-4 text-gray-800">
<header class="bg-white border rounded-2xl shadow p-4 mb-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">لوحة Saradud — HTMX</h1>
  <nav class="space-x-2 space-x-reverse">
    <a href="/ui/farms/" class="px-3 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg">المزارع</a>
    <a href="/ui/logs/new" class="px-3 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg">سجل يومي</a>
    <a href="/ui/audit/" class="px-3 py-2 bg-gray-700 hover:bg-gray-800 text-white rounded-lg">التدقيق</a>
    <a target="_blank" href="/api/docs/" class="px-3 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-lg">API</a>
  </nav>
</header>
<main class="bg-white border rounded-2xl shadow p-4">
  {% block content %}{% endblock %}
</main>
</body>
</html>
