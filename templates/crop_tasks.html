
{% extends "base.html" %}
{% block title %}مهام المحاصيل (HTMX){% endblock %}
{% block content %}
<div class="flex items-center gap-2 mb-3">
  <input id="q" name="q" value="{{ q }}" placeholder="بحث اسم/مرحلة/محصول..." class="border rounded p-2 flex-1"
         hx-get="/ui/crop-tasks/" hx-trigger="keyup changed delay:300ms" hx-target="#rows" hx-include="#q"/>
  <form hx-post="/ui/crop-tasks/" hx-target="#rows" hx-swap="afterbegin" class="flex items-center gap-2">
    <select name="crop_id" class="border rounded p-2">
      {% for c in crops %}<option value="{{ c.id }}">{{ c.name }} ({{ c.mode }})</option>{% endfor %}
    </select>
    <select name="stage" class="border rounded p-2">
      <option>التجهيز</option><option>الزراعة</option><option>العناية</option><option>النمو</option><option>الحصاد</option><option>ما بعد الحصاد</option>
    </select>
    <input name="name" class="border rounded p-2" placeholder="اسم المهمة"/>
    <button class="px-3 py-2 bg-emerald-500 text-white rounded">إضافة</button>
  </form>
</div>
<table class="w-full text-sm">
  <thead><tr class="text-right text-gray-600"><th class="p-2">المحصول</th><th class="p-2">المرحلة</th><th class="p-2">المهمة</th></tr></thead>
  <tbody id="rows">{% include "partials/crop_tasks_rows.html" with tasks=tasks %}</tbody>
</table>
{% endblock %}
